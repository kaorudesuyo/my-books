<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' https: data:; connect-src 'self'; base-uri 'self'; form-action 'none'; object-src 'none'; frame-ancestors 'self'">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Books — Kaoru Furubayashi</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Jost:wght@200;300;400;500&family=Noto+Serif+JP:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0a0a0a;
      --bg2:       #111111;
      --border:    rgba(255,255,255,0.12);
      --white:     #ffffff;
      --muted:     rgba(255,255,255,0.50);
      --accent:    rgba(255,255,255,0.06);
      --conveyor-speed: 32s;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Noto Serif JP', serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    .page-header {
      padding: 4rem 2rem 2rem;
      max-width: 1100px;
      margin: 0 auto;
    }
    .page-label {
      font-family: 'Jost', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    .page-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.2rem, 6vw, 4rem);
      font-weight: 300;
      letter-spacing: 0.06em;
      line-height: 1.1;
      color: var(--white);
    }
    .page-title em {
      font-style: italic;
      color: var(--muted);
    }
    .page-subtitle {
      margin-top: 0.8rem;
      font-size: 0.82rem;
      color: var(--muted);
      font-weight: 300;
      letter-spacing: 0.04em;
      line-height: 1.8;
    }
    .header-line {
      width: 3rem;
      height: 1px;
      background: var(--border);
      margin: 2rem 0 0;
    }

    /* ── LOADING / ERROR ── */
    .loading-state {
      padding: 4rem 2rem;
      text-align: center;
      font-family: 'Jost', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .error-state {
      padding: 3rem 2rem;
      max-width: 640px;
      margin: 0 auto;
    }
    .error-state h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 300;
      color: var(--white);
      margin-bottom: 0.8rem;
    }
    .error-state p {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.9;
    }
    .error-state code {
      font-size: 0.75rem;
      background: var(--accent);
      border: 1px solid var(--border);
      padding: 0.1rem 0.4rem;
      color: rgba(255,255,255,0.7);
    }

    /* ── CONVEYOR ── */
    .conveyor-section {
      padding: 3rem 0 4rem;
      position: relative;
    }
    .conveyor-section::before,
    .conveyor-section::after {
      content: '';
      position: absolute;
      top: 0; bottom: 0;
      width: 120px;
      z-index: 10;
      pointer-events: none;
    }
    .conveyor-section::before {
      left: 0;
      background: linear-gradient(to right, var(--bg) 0%, transparent 100%);
    }
    .conveyor-section::after {
      right: 0;
      background: linear-gradient(to left, var(--bg) 0%, transparent 100%);
    }
    .conveyor-track { overflow: hidden; cursor: default; }
    .conveyor-track + .conveyor-track { margin-top: 2rem; }

    .conveyor-inner {
      display: flex;
      gap: 1.4rem;
      width: max-content;
      animation: conveyor-scroll var(--conveyor-speed) linear infinite;
      will-change: transform;
    }
    .conveyor-inner.reverse  { animation-name: conveyor-scroll-reverse; }
    .conveyor-inner.paused   { animation-play-state: paused; }

    @keyframes conveyor-scroll         { 0% { transform: translateX(0);    } 100% { transform: translateX(-50%); } }
    @keyframes conveyor-scroll-reverse { 0% { transform: translateX(-50%); } 100% { transform: translateX(0);    } }

    /* ── BOOK CARD ── */
    .book-card {
      flex-shrink: 0;
      width: 160px;
      cursor: pointer;
      position: relative;
      transition: transform 0.35s cubic-bezier(0.23, 1, 0.32, 1),
                  opacity 0.4s ease,
                  filter 0.4s ease;
      transform-origin: bottom center;
    }
    .book-card:hover { transform: scale(1.12) translateY(-6px); z-index: 5; }
    .book-card.dimmed {
      opacity: 0.2;
      filter: grayscale(60%);
    }
    .book-card.dimmed:hover {
      opacity: 0.5;
      filter: grayscale(0%);
    }

    .book-cover-wrap {
      width: 160px;
      height: 230px;
      overflow: hidden;
      position: relative;
      background: transparent;
    }
    .book-cover-wrap img {
      width: 100%; height: 100%;
      object-fit: contain;
      object-position: center;
      background: transparent;
      display: block;
      transition: opacity 0.3s;
    }
    .book-cover-wrap .cover-fallback {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0.5rem; padding: 1rem; text-align: center;
    }
    .cover-fallback-title {
      font-family: 'Noto Serif JP', serif;
      font-size: 0.72rem; font-weight: 300;
      color: var(--white); line-height: 1.5; letter-spacing: 0.04em;
    }
    .cover-fallback-author {
      font-family: 'Jost', sans-serif;
      font-size: 0.58rem; color: var(--muted);
      letter-spacing: 0.1em; margin-top: 0.3rem;
    }
    .book-card-label {
      margin-top: 0.6rem;
      font-family: 'Noto Serif JP', serif;
      font-size: 0.7rem; font-weight: 300;
      color: var(--muted); letter-spacing: 0.02em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      max-width: 160px; transition: color 0.25s;
    }
    .book-card:hover .book-card-label { color: var(--white); }

    /* ── MODAL ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.88);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      padding: 2rem;
      opacity: 0; pointer-events: none;
      transition: opacity 0.35s ease;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      max-width: 680px; width: 100%;
      display: flex; gap: 2.4rem; padding: 2.4rem;
      position: relative;
      transform: translateY(20px) scale(0.97);
      transition: transform 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .modal-overlay.open .modal { transform: translateY(0) scale(1); }
    .modal-cover { flex-shrink: 0; width: 140px; }
    .modal-cover img {
      width: 140px; height: 200px; object-fit: contain; object-position: center; background: transparent; display: block;
    }
    .modal-cover-fallback {
      width: 140px; height: 200px;
      background: var(--accent); border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      padding: 1rem; text-align: center;
    }
    .modal-cover-fallback span {
      font-family: 'Noto Serif JP', serif;
      font-size: 0.75rem; font-weight: 300;
      color: var(--muted); line-height: 1.7;
    }
    .modal-body { flex: 1; display: flex; flex-direction: column; gap: 1rem; min-width: 0; }
    .modal-tag {
      font-family: 'Jost', sans-serif;
      font-size: 0.55rem; letter-spacing: 0.28em;
      text-transform: uppercase; color: var(--muted);
    }
    .modal-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.3rem, 3vw, 1.85rem); font-weight: 300;
      letter-spacing: 0.04em; line-height: 1.3; color: var(--white);
    }
    .modal-author {
      font-family: 'Jost', sans-serif;
      font-size: 0.72rem; letter-spacing: 0.16em;
      color: var(--muted); text-transform: uppercase;
    }
    .modal-divider { width: 100%; height: 1px; background: var(--border); }
    .modal-review {
      font-family: 'Noto Serif JP', serif;
      font-size: 0.82rem; font-weight: 300;
      line-height: 1.95; color: rgba(255,255,255,0.75);
      letter-spacing: 0.04em; flex: 1;
    }
    .modal-footer {
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 0.8rem; margin-top: auto;
    }
    .modal-genre {
      font-family: 'Jost', sans-serif;
      font-size: 0.58rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--muted);
      background: var(--accent); border: 1px solid var(--border);
      padding: 0.25rem 0.7rem;
    }
    .modal-amazon {
      font-family: 'Jost', sans-serif;
      font-size: 0.62rem; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--muted);
      text-decoration: none; border: 1px solid var(--border);
      padding: 0.5rem 1.2rem;
      display: inline-flex; align-items: center; gap: 0.5rem;
      transition: color 0.25s, border-color 0.25s, letter-spacing 0.25s;
    }
    .modal-amazon:hover { color: var(--white); border-color: rgba(255,255,255,0.35); letter-spacing: 0.3em; }
    .modal-amazon svg { width: 12px; height: 12px; flex-shrink: 0; }
    .modal-close {
      position: absolute; top: 1.2rem; right: 1.2rem;
      background: none; border: 1px solid var(--border);
      color: var(--muted); cursor: pointer;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.2s, border-color 0.2s;
      font-size: 1rem; line-height: 1;
    }
    .modal-close:hover { color: var(--white); border-color: rgba(255,255,255,0.35); }

    /* ── FILTER / COUNT ── */
    .filter-bar {
      display: flex; flex-wrap: wrap; gap: 0.5rem;
      padding: 0 2rem 1.5rem; max-width: 1100px; margin: 0 auto;
    }
    .filter-btn {
      font-family: 'Jost', sans-serif;
      font-size: 0.58rem; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--muted);
      background: transparent; border: 1px solid var(--border);
      padding: 0.35rem 0.85rem; cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      color: var(--white); border-color: rgba(255,255,255,0.35); background: var(--accent);
    }
    .book-count {
      font-family: 'Jost', sans-serif;
      font-size: 0.6rem; letter-spacing: 0.18em;
      color: var(--muted); padding: 0 2rem 1rem;
      max-width: 1100px; margin: 0 auto;
    }

    /* ── MOBILE ── */
    @media (max-width: 640px) {
      .modal { flex-direction: column; gap: 1.5rem; padding: 1.8rem 1.4rem; }
      .modal-cover { width: 100%; display: flex; justify-content: center; }
      .modal-cover img, .modal-cover-fallback { width: 120px; height: 170px; }
      .book-card { width: 130px; }
      .book-cover-wrap { width: 130px; height: 186px; }
      .book-card-label { max-width: 130px; }
      .page-header { padding: 3rem 1.2rem 1.5rem; }
      .filter-bar { padding: 0 1.2rem 1.2rem; }
      .book-count { padding: 0 1.2rem 1rem; }
      .conveyor-section::before, .conveyor-section::after { width: 40px; }
    }

    /* ── FOOTER ── */
    .page-footer {
      border-top: 1px solid var(--border);
      margin-top: 4rem;
      padding: 2.4rem 2rem;
    }
    .page-footer-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1.2rem;
    }
    .footer-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--white);
    }
    .footer-name span {
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      font-family: 'Jost', sans-serif;
      margin-left: 0.8rem;
      text-transform: uppercase;
    }
    .footer-links {
      display: flex;
      align-items: center;
      gap: 1.2rem;
      list-style: none;
    }
    .footer-links a {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.25s, transform 0.25s;
    }
    .footer-links a:hover {
      color: var(--white);
      transform: translateY(-2px);
    }
    .footer-links svg {
      width: 16px;
      height: 16px;
      display: block;
    }
    .footer-copy {
      width: 100%;
      font-family: 'Jost', sans-serif;
      font-size: 0.55rem;
      letter-spacing: 0.18em;
      color: rgba(255,255,255,0.25);
      margin-top: 1.2rem;
    }
    @media (max-width: 640px) {
      .page-footer-inner { flex-direction: column; align-items: flex-start; gap: 1rem; }
      .footer-copy { margin-top: 0.6rem; }
    }

    /* ── LOADING / ERROR ── */
    .loading-state {
      padding: 4rem 2rem; text-align: center;
      font-family: 'Jost', sans-serif;
      font-size: 0.65rem; letter-spacing: 0.28em;
      text-transform: uppercase; color: var(--muted);
    }
    .error-state { padding: 3rem 2rem; max-width: 640px; margin: 0 auto; }
    .error-state h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; font-weight: 300; color: var(--white); margin-bottom: 0.8rem;
    }
    .error-state p { font-size: 0.8rem; color: var(--muted); line-height: 1.9; }
    .error-state code {
      font-size: 0.75rem; background: var(--accent);
      border: 1px solid var(--border); padding: 0.1rem 0.4rem; color: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="page-header">
    <p class="page-label">Kaoru Furubayashi — Reading List</p>
    <h1 class="page-title">私をつくる、百冊の本</h1>
    <p class="page-subtitle">私の思考に影響を与えている本を、100冊キュレーションしました。感性の名刺代わりにでもなればと。</p>
    <div class="header-line"></div>
  </header>

  <!-- FILTER -->
  <div class="filter-bar" id="filter-bar">
    <button class="filter-btn active" data-genre="all">All</button>
  </div>
  <div class="book-count" id="book-count"></div>

  <!-- CONVEYOR（CSV読み込み後に表示） -->
  <section class="conveyor-section" id="conveyor-section" style="display:none;">
    <div class="conveyor-track">
      <div class="conveyor-inner" id="conveyor-inner"></div>

    <div class="conveyor-track">
      <div class="conveyor-inner reverse" id="conveyor-inner-2"></div>
    </div>
  </section>

  <!-- LOADING / ERROR -->
  <div id="loading-state" class="loading-state">Loading…</div>
  <div id="error-state" class="error-state" style="display:none;"></div>

  <!-- MODAL -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <button class="modal-close" id="modal-close" aria-label="閉じる">✕</button>
      <div class="modal-cover" id="modal-cover"></div>
      <div class="modal-body">
        <p  class="modal-tag"    id="modal-tag"></p>
        <h2 class="modal-title"  id="modal-title"></h2>
        <p  class="modal-author" id="modal-author"></p>
        <div class="modal-divider"></div>
        <p  class="modal-review" id="modal-review"></p>
        <div class="modal-footer">
          <span class="modal-genre" id="modal-genre"></span>
          <a class="modal-amazon" id="modal-amazon" href="#" target="_blank" rel="noopener noreferrer">
            <svg viewBox="0 0 24 24" fill="currentColor">

            </svg>
            Amazon で見る
          </a>
        </div>

  </div>

    <!-- Excel(.xlsx)読み込み用ライブラリ（ローカル同梱・外部通信なし） -->
    <script src="lib/xlsx.full.min.js"></script>

    <script>
    /* ============================================================
       データソース: books.xlsx（優先） / books.csv（予備）
       ------------------------------------------------------------
       本のデータは books.html と同じフォルダに置いた
       books.xlsx をそのまま読み込みます。CSVへの書き出しは不要です。

       列: id, title, author, genre, cover, amazonUrl, review
       （1行目は必ずこのヘッダー行にしてください）

       【更新方法】
       1. books.xlsx を Excel で開いて編集・保存
       2. サーバー上の books.xlsx を差し替える
       3. books.html をブラウザでリロードすれば反映されます

       ※ books.xlsx が無い場合のみ books.csv を読みにいきます。

       【cover列】
       - 画像パスを記入（例: cover/1.jpg）
       - 空欄にするとタイトル文字のフォールバック表示になります
    ============================================================ */
    const XLSX_PATH = 'books.xlsx';
    const CSV_PATH  = 'books.csv';

    /* ── CSVパーサー（RFC4180準拠・ダブルクォート/改行対応） ── */
    function parseCSV(raw) {
      raw = raw.replace(/^\uFEFF/, '');           // BOM除去
      const rows = [];
      let row = [], field = '', inQ = false;
      for (let i = 0; i < raw.length; i++) {
        const c = raw[i], n = raw[i + 1];
        if (inQ) {
          if (c === '"' && n === '"') { field += '"'; i++; }
          else if (c === '"')         { inQ = false; }
          else                        { field += c; }
        } else {
          if      (c === '"')                { inQ = true; }
          else if (c === ',')                { row.push(field); field = ''; }
          else if (c === '\r' && n === '\n') { row.push(field); field=''; rows.push(row); row=[]; i++; }
          else if (c === '\n' || c === '\r') { row.push(field); field=''; rows.push(row); row=[]; }
          else                               { field += c; }
        }
      }
      if (field !== '' || row.length) { row.push(field); rows.push(row); }
      const valid = rows.filter(r => r.some(c => c.trim()));
      const [headers, ...data] = valid;
      return data.map(r => {
        const o = {};
        headers.forEach((h, i) => { o[h.trim()] = (r[i] ?? '').trim(); });
        return o;
      });
    }

    /* ── アプリ本体 ── */
    (function () {
      const inner1    = document.getElementById('conveyor-inner');
      const inner2    = document.getElementById('conveyor-inner-2');
      const section   = document.getElementById('conveyor-section');
      const filterBar = document.getElementById('filter-bar');
      const countEl   = document.getElementById('book-count');
      const loadEl    = document.getElementById('loading-state');
      const errEl     = document.getElementById('error-state');
      const overlay   = document.getElementById('modal-overlay');
      const closeBtn  = document.getElementById('modal-close');

      let ALL_BOOKS = [];
      let currentGenre = 'all';

      /* ── Excel(.xlsx) → オブジェクト配列 ── */
      function parseXLSX(buffer) {
        if (typeof XLSX === 'undefined') throw new Error('lib/xlsx.full.min.js が読み込めていません');
        const wb    = XLSX.read(buffer, { type: 'array' });
        const sheet = wb.Sheets[wb.SheetNames[0]];
        const raw   = XLSX.utils.sheet_to_json(sheet, { defval: '', raw: false });
        return raw.map(r => {
          const o = {};
          Object.keys(r).forEach(k => { o[String(k).trim()] = String(r[k] ?? '').trim(); });
          return o;
        });
      }

      /* ── データ読み込み: books.xlsx を優先、無ければ books.csv ── */
      (async function loadData() {
        try {
          let books = null;

          // 1) Excel を試す
          try {
            const res = await fetch(XLSX_PATH);
            if (res.ok) {
              books = parseXLSX(await res.arrayBuffer());
            }
          } catch (_) { /* 次の手段へ */ }

          // 2) 無ければ CSV
          if (!books || !books.length) {
            const res = await fetch(CSV_PATH);
            if (!res.ok) throw new Error(`books.xlsx / books.csv のどちらも読み込めませんでした（HTTP ${res.status}）`);
            books = parseCSV(await res.text());
          }

          ALL_BOOKS = books.filter(b => b.title || b.cover);
          if (!ALL_BOOKS.length) throw new Error('データが空です。1行目がヘッダー行（id, title, author, genre, cover, amazonUrl, review）か確認してください');
          onLoaded();

        } catch (err) {
          loadEl.style.display = 'none';
          errEl.style.display  = 'block';
          errEl.innerHTML = `
            <h3>データを読み込めませんでした</h3>
            <p>
              <code>books.xlsx</code>（または <code>books.csv</code>）を
              <code>books.html</code> と同じフォルダに置いてください。<br><br>
              ローカルでHTMLを直接ダブルクリックして開くと、ブラウザのセキュリティ制限でファイルを読み込めません。<br>
              VS Code の Live Server や <code>python3 -m http.server</code> などの簡易サーバー経由でご覧ください。<br><br>
              エラー: ${String(err.message).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
            </p>`;
        }
      })();

      function onLoaded() {
        loadEl.style.display  = 'none';
        section.style.display = '';

        const genres = [...new Set(ALL_BOOKS.map(b => b.genre).filter(Boolean))];
        genres.forEach(g => {
          const btn = document.createElement('button');
          btn.className = 'filter-btn';
          btn.dataset.genre = g;
          btn.textContent = g;
          filterBar.appendChild(btn);
        });

        filterBar.addEventListener('click', e => {
          const btn = e.target.closest('.filter-btn');
          if (!btn) return;
          currentGenre = btn.dataset.genre;
          filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          applyDim(currentGenre);
        });

        buildBoth(ALL_BOOKS);
      }

      /* ── コンベア構築 ── */
      function buildBoth(books) {
        const speed = Math.max(20, books.length * 2.8);
        document.documentElement.style.setProperty('--conveyor-speed', `${speed}s`);
        buildTrack(inner1, books);
        buildTrack(inner2, [...books].reverse());
        countEl.textContent = `${books.length} books`;
      }

      /* ── ジャンルフィルター: 全件表示のまま非該当を暗転 ── */
      function applyDim(genre) {
        document.querySelectorAll('.book-card').forEach(card => {
          if (genre === 'all' || card.dataset.genre === genre) card.classList.remove('dimmed');
          else card.classList.add('dimmed');
        });
      }

      function buildTrack(el, books) {
        el.innerHTML = '';
        [...books, ...books].forEach(b => el.appendChild(makeCard(b, el)));
      }

      function makeCard(book, parentInner) {
        const card = document.createElement('div');
        card.className = 'book-card';
        card.dataset.genre = book.genre || '';
        card.setAttribute('role', 'button');
        card.setAttribute('tabindex', '0');
        card.setAttribute('aria-label', `${book.title} — ${book.author}`);

        const wrap = document.createElement('div');
        wrap.className = 'book-cover-wrap';

        const coverSrc = safeImageSrc(book.cover);
        if (coverSrc) {
          const img = document.createElement('img');
          img.src = coverSrc; img.alt = book.title; img.loading = 'lazy';
          wrap.appendChild(img);
        } else {
          const fb = document.createElement('div');
          fb.className = 'cover-fallback';
          fb.innerHTML = `<span class="cover-fallback-title">${escHtml(book.title)}</span>
                          <span class="cover-fallback-author">${escHtml(book.author)}</span>`;
          wrap.appendChild(fb);
        }

        const lbl = document.createElement('p');
        lbl.className = 'book-card-label';
        lbl.textContent = book.title;

        card.appendChild(wrap);
        card.appendChild(lbl);

        card.addEventListener('mouseenter', () => parentInner.classList.add('paused'));
        card.addEventListener('mouseleave', () => parentInner.classList.remove('paused'));
        card.addEventListener('click',  () => openModal(book));
        card.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openModal(book); }
        });

        return card;
      }

      /* ── モーダル ── */
      function openModal(book) {
        const coverEl = document.getElementById('modal-cover');
        coverEl.innerHTML = '';
        const modalCoverSrc = safeImageSrc(book.cover);
        if (modalCoverSrc) {
          const img = document.createElement('img');
          img.src = modalCoverSrc; img.alt = book.title;
          coverEl.appendChild(img);
        } else {
          const fb = document.createElement('div');
          fb.className = 'modal-cover-fallback';
          fb.innerHTML = `<span>${escHtml(book.title)}<br><br>${escHtml(book.author)}</span>`;
          coverEl.appendChild(fb);
        }
        document.getElementById('modal-tag').textContent    = book.genre    || '';
        document.getElementById('modal-title').textContent  = book.title    || '';
        document.getElementById('modal-author').textContent = book.author   || '';
        document.getElementById('modal-review').textContent = book.review   || '';
        document.getElementById('modal-genre').textContent  = book.genre    || '';
        document.getElementById('modal-amazon').href        = safeExternalUrl(book.amazonUrl);

        overlay.classList.add('open');
        document.body.style.overflow = 'hidden';
      }

      function closeModal() {
        overlay.classList.remove('open');
        document.body.style.overflow = '';
      }

      closeBtn.addEventListener('click', closeModal);
      overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

      function escHtml(s) {
        return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
      }

      /* 外部リンクURL検証: http/https のみ許可（javascript: 等のXSS防止） */
      function safeExternalUrl(url) {
        if (!url) return '#';
        try {
          const u = new URL(url, location.href);
          if (u.protocol === 'http:' || u.protocol === 'https:') return u.href;
        } catch (e) { /* 不正なURLは弾く */ }
        return '#';
      }

      /* 画像パス検証: 相対パス or http/https のみ許可 */
      function safeImageSrc(src) {
        if (!src) return '';
        if (/^(javascript|data|vbscript):/i.test(src.trim())) return '';
        try {
          const u = new URL(src, location.href);
          if (u.protocol === 'http:' || u.protocol === 'https:') return src;
        } catch (e) { /* 不正なURLは弾く */ }
        return '';
      }
    })();
  </script>
